name: Native Core Build

on:
  push:
    branches: [main]
    paths:
      - 'torus-core/**'
      - 'src-tauri/**'
      - '.github/workflows/native-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'torus-core/**'
      - 'src-tauri/**'

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: torus-core
      - name: Check
        run: cargo check --manifest-path torus-core/Cargo.toml
      - name: Test
        run: cargo test --manifest-path torus-core/Cargo.toml

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: torus-core
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build core
        run: cargo build --release --manifest-path torus-core/Cargo.toml --target aarch64-apple-darwin
      - name: Run tests
        run: cargo test --release --manifest-path torus-core/Cargo.toml

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: torus-core
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build core
        run: cargo build --release --manifest-path torus-core/Cargo.toml
      - name: Run tests
        run: cargo test --release --manifest-path torus-core/Cargo.toml
