<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torus Turbo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0c0d1e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease-out;
  }
  body.visible {
    opacity: 1;
  }
  body.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease-in;
  }
  .splash {
    text-align: center;
  }
  .title {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(99, 102, 241, 0.25), 0 0 80px rgba(99, 102, 241, 0.08);
  }
  .subtitle {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 8px;
    color: #6366F1;
    text-transform: uppercase;
    margin-top: 10px;
    opacity: 0.9;
  }
  .platform {
    font-size: 11px;
    letter-spacing: 3px;
    color: #6e72a0;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.6;
  }
  .bar-wrap {
    margin-top: 28px;
    width: 240px;
    height: 3px;
    background: rgba(99, 102, 241, 0.12);
    border-radius: 2px;
    overflow: hidden;
    margin-left: auto;
    margin-right: auto;
  }
  .bar-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #6366F1, #818cf8);
    border-radius: 2px;
    animation: loading 2s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 10%; margin-left: 0; }
    50% { width: 50%; margin-left: 25%; }
    100% { width: 10%; margin-left: 90%; }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="title">TORUS TURBO</div>
    <div class="subtitle">Native</div>
    <div class="platform" id="platform"></div>
    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
  </div>
  <script>
    const ua = navigator.userAgent.toLowerCase();
    let platform = '';
    if (ua.includes('mac')) {
      platform = navigator.userAgent.includes('ARM') || navigator.platform === 'MacIntel'
        ? 'macOS · Apple Silicon' : 'macOS · Intel';
    } else if (ua.includes('linux')) {
      platform = 'Linux · x86_64';
    } else if (ua.includes('win')) {
      platform = 'Windows';
    }
    document.getElementById('platform').textContent = platform;
    requestAnimationFrame(() => {
      document.body.classList.add('visible');
    });
  </script>
</body>
</html>
